apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}-nginx
  labels:
{{ include "frontend.labels" . | indent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://{{ .Values.backendService.name }}:{{ .Values.backendService.port }}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /healthz {
        proxy_pass http://{{ .Values.backendService.name }}:{{ .Values.backendService.port }}/healthz;
        proxy_set_header Host $host;
      }

      location / {
        try_files $uri /index.html;
      }
    }
