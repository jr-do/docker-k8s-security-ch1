services:
  backend:
    build: ./backend
    container_name: ch1-backend
    environment:
      PORT: "${BACKEND_PORT:-8080}"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - ch1-net

  frontend:
    build: ./frontend
    container_name: ch1-frontend
    environment:
      API_BASE_URL: "${API_BASE_URL:-}"
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - ch1-net
    depends_on:
      - backend

networks:
  ch1-net:
    driver: bridge
