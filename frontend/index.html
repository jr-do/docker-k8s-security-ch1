<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Info Viewer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: "Georgia", "Times New Roman", serif;
        margin: 32px;
        background: #f5f3ef;
        color: #2a2a2a;
      }

      .card {
        max-width: 980px;
        background: #fff9f0;
        border: 1px solid #e4dccf;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 860px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      button {
        background: #2f5d62;
        color: #ffffff;
        border: none;
        padding: 10px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #status {
        margin: 12px 0;
        font-size: 0.95rem;
      }

      #status.error {
        color: #b00020;
        font-weight: 600;
      }

      pre {
        background: #1f1f1f;
        color: #f2f2f2;
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
      }

      #map {
        height: 360px;
        border-radius: 8px;
        border: 1px solid #e4dccf;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>API Info Viewer</h1>
      <p>Click the button to load JSON from the backend.</p>
      <button id="loadBtn">Load data</button>
      <div id="status">Idle</div>
      <div class="layout">
        <pre id="output">{}</pre>
        <div>
          <h2>Geo Map</h2>
          <div id="map"></div>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="config.js"></script>
    <script>
      const hasConfig = window.__CONFIG__ &&
        Object.prototype.hasOwnProperty.call(window.__CONFIG__, "API_BASE_URL");
      const API_BASE_URL = hasConfig ? window.__CONFIG__.API_BASE_URL : "http://localhost:8080";
      const loadBtn = document.getElementById("loadBtn");
      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");
      const mapEl = document.getElementById("map");

      const map = L.map(mapEl).setView([20, 0], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);
      let marker = null;

      const setStatus = (message, isError = false) => {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      };

      const fetchInfo = async () => {
        setStatus("Loading...");
        loadBtn.disabled = true;

        try {
          const response = await fetch(`${API_BASE_URL}/api/info`);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          outputEl.textContent = JSON.stringify(data, null, 2);
          if (data.ip_location && data.ip_location.lat && data.ip_location.lon) {
            const lat = Number(data.ip_location.lat);
            const lon = Number(data.ip_location.lon);
            if (!Number.isNaN(lat) && !Number.isNaN(lon)) {
              map.setView([lat, lon], 10);
              if (marker) {
                marker.setLatLng([lat, lon]);
              } else {
                marker = L.marker([lat, lon]).addTo(map);
              }
            }
          }
          setStatus("Loaded successfully");
        } catch (err) {
          outputEl.textContent = "{}";
          setStatus(`Error: ${err.message}`, true);
        } finally {
          loadBtn.disabled = false;
        }
      };

      loadBtn.addEventListener("click", fetchInfo);
    </script>
  </body>
</html>
