name: Build and Push Images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Build and push
        run: |
          IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend"
          docker build -t "${IMAGE_BASE}:latest" -t "${IMAGE_BASE}:${GITHUB_SHA}" ./backend
          docker push "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:${GITHUB_SHA}"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Build and push
        run: |
          IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-frontend"
          docker build -t "${IMAGE_BASE}:latest" -t "${IMAGE_BASE}:${GITHUB_SHA}" ./frontend
          docker push "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:${GITHUB_SHA}"
