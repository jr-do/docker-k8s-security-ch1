name: Release (Build Images + Push Helm Chart)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Install Trivy
        run: |
          TRIVY_VERSION="0.55.2"
          curl -sSL -o /tmp/trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf /tmp/trivy.tar.gz -C /tmp
          sudo mv /tmp/trivy /usr/local/bin/trivy

      - name: Build backend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-backend"
          VERSION="${{ steps.version.outputs.version }}"
          docker build -t "${IMAGE}:${VERSION}" -t "${IMAGE}:latest" ./backend

      - name: Build frontend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-frontend"
          VERSION="${{ steps.version.outputs.version }}"
          docker build -t "${IMAGE}:${VERSION}" -t "${IMAGE}:latest" ./frontend

      - name: Scan images (CRITICAL only)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-backend:${VERSION}"
          FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-frontend:${VERSION}"
          trivy image --severity CRITICAL --exit-code 1 "${BACKEND_IMAGE}"
          trivy image --severity CRITICAL --exit-code 1 "${FRONTEND_IMAGE}"

      - name: Generate SBOMs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-backend:${VERSION}"
          FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-frontend:${VERSION}"
          trivy image --format cyclonedx --output backend-sbom.cdx.json "${BACKEND_IMAGE}"
          trivy image --format cyclonedx --output frontend-sbom.cdx.json "${FRONTEND_IMAGE}"

      - name: Generate SARIF reports
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-backend:${VERSION}"
          FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-frontend:${VERSION}"
          trivy image --format sarif --output backend.sarif "${BACKEND_IMAGE}"
          trivy image --format sarif --output frontend.sarif "${FRONTEND_IMAGE}"

      - name: Upload SARIF (backend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend.sarif

      - name: Upload SARIF (frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend.sarif

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            backend-sbom.cdx.json
            frontend-sbom.cdx.json

      - name: Push backend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-backend"
          VERSION="${{ steps.version.outputs.version }}"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

      - name: Push frontend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1-frontend"
          VERSION="${{ steps.version.outputs.version }}"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

      - name: Update chart version and image tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version: .*/version: ${VERSION}/" helm/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" helm/Chart.yaml
          sed -i "s/^\([[:space:]]*\)tag: .*/\1tag: ${VERSION}/" helm/values.yaml

      - name: Install Helm
        run: |
          HELM_VERSION="v3.15.4"
          curl -sSL -o /tmp/helm.tar.gz "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/helm.tar.gz -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm

      - name: Package and push chart
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          helm package ./helm --version "${VERSION}" --app-version "${VERSION}"
          echo "${{ secrets.GHCR_PAT }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "ch1-${VERSION}.tgz" oci://ghcr.io/${{ github.repository_owner }}/docker-k8s-security-ch1
